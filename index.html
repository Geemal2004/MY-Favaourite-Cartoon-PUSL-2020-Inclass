<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selection Box UI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    h2 {
      color: #e2e8f0;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      align-self: flex-start;
    }

    .select-wrapper {
      position: relative;
      width: 100%;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
      font-size: 1.1rem;
    }

    select {
      width: 100%;
      padding: 14px 44px 14px 18px;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    select:hover {
      border-color: rgba(99, 179, 237, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    select:focus {
      border-color: #63b3ed;
      box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.2);
    }

    select option {
      background: #1e293b;
      color: #e2e8f0;
    }

    .image-container {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-container:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .image-container img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    .image-label {
      padding: 10px 16px;
      color: #94a3b8;
      font-size: 0.82rem;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      margin-top: 2px;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Choose a Category</h2>

    <div class="select-wrapper">
      <select id="categorySelect" onchange="updateImage()">
        <option value="TinTin">TinTin</option>
        <option value="Captain">Captain</option>
        <option value="Calculas">Calculas</option>
        <option value="Snowey">Snowey</option>
        <option value="Thomsan and Tomsan">Thomsan and Tomsan</option>
      </select>
    </div>

    <div class="image-container">
      <img id="previewImage" src="" alt="Preview" />
      <div class="image-label">
        Selected: <span class="badge" id="imageLabel">Nature</span>
      </div>
    </div>
  </div>

  <script>
    const images = {
      TinTin:    'https://th.bing.com/th/id/OIP.Bi4V0kWj1Jv8It_RUhm2YAHaE7?w=256&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3?w=600&auto=format&fit=crop',
      Captain:      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTD17Zw8qGgEt1l6322TphRbeLVmN3qbFoNAA&s?w=600&auto=format&fit=crop',
      Calculas:     'https://upload.wikimedia.org/wikipedia/en/d/dc/Professor_Calculus.png?w=600&auto=format&fit=crop',
      Snowey: 'https://static.wikia.nocookie.net/tintin/images/3/39/Picture_2.png/revision/latest/scale-to-width/360?cb=20190711001249?w=600&auto=format&fit=crop',
      'Thomsan and Tomsan':     'https://upload.wikimedia.org/wikipedia/en/8/8b/Tintin_-_Thomson_%26_Thompson.png?w=600&auto=format&fit=crop',
    };

    const labels = {
      TinTin:    'TinTin',
      Captain:      'Captain',
      Calculas:     'Calculas',
      Snowey: 'Snowey',
      'Thomsan and Tomsan':     'Thomsan and Tomsan',
    };

    function updateImage() {
      const select = document.getElementById('categorySelect');
      const img    = document.getElementById('previewImage');
      const label  = document.getElementById('imageLabel');
      const value  = select.value;

      img.style.opacity = '0';
      setTimeout(() => {
        img.src = images[value];
        label.textContent = labels[value];
        img.style.opacity = '1';
      }, 200);
    }

    // Initialize on load
    updateImage();
  </script>
</body>
</html>
